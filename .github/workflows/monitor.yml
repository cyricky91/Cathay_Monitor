name: Cathay Flight Monitor

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor Script
        run: python Monitor.py

      - name: Upload Data Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flight-json-data
          path: flight_data.json
